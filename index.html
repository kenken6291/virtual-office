<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Virtual Office</title>
<script src="config.js"></script>
<style>
/* ─── リセット & 変数 ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0c0c1e;
  --panel:   #10102a;
  --border:  #252550;
  --accent:  #5f5fef;
  --accent2: #ef5fa7;
  --green:   #3ddc84;
  --red:     #ff4f6a;
  --yellow:  #ffe066;
  --text:    #d0d0f0;
  --dim:     #555588;
}

body {
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  touch-action: none;
}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
#header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  z-index: 20;
}
#header h1 {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  flex: 1;
  white-space: nowrap;
}
#header h1 em { color: var(--accent2); font-style: normal; }
.hbadge {
  font-size: 8px;
  padding: 1px 5px;
  border: 1px solid var(--border);
  color: var(--dim);
}
#online-badge { font-size: 9px; color: var(--green); white-space: nowrap; }

/* ════════════════════════════════════════
   LAYOUT
════════════════════════════════════════ */
#app { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ════════════════════════════════════════
   MAP
════════════════════════════════════════ */
#map-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #080816;
}
#gameCanvas {
  display: block;
  image-rendering: pixelated;
}
#call-ring {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: var(--accent2);
  color: #fff;
  font-size: 9px;
  letter-spacing: 1px;
  padding: 4px 10px;
  display: none;
  animation: pulse 1.2s infinite;
  z-index: 5;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ════════════════════════════════════════
   DESKTOP SIDEBAR (≥ 640px)
════════════════════════════════════════ */
#sidebar {
  width: 200px;
  flex-shrink: 0;
  background: var(--panel);
  border-left: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sb-head {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  padding: 7px 10px 4px;
  border-bottom: 1px solid var(--border);
}
#video-grid {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 6px;
  overflow-y: auto;
  min-height: 80px;
}
.vid-item {
  position: relative;
  background: #000;
  border: 1px solid var(--border);
}
.vid-item video {
  width: 100%;
  display: block;
  aspect-ratio: 4/3;
  object-fit: cover;
}
.vid-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.65);
  font-size: 8px;
  padding: 2px 5px;
  color: var(--text);
  letter-spacing: 1px;
}
.vid-self .vid-label { color: var(--yellow); }

#players-list {
  max-height: 130px;
  overflow-y: auto;
  padding: 4px 8px;
}
.pl-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
  font-size: 9px;
}
.pl-dot { width: 7px; height: 7px; flex-shrink: 0; }
.pl-name { flex: 1; }
.pl-dist { color: var(--dim); font-size: 8px; }
.pl-call { color: var(--accent2); font-size: 8px; }

#hints {
  padding: 7px 10px;
  border-top: 1px solid var(--border);
  font-size: 8px;
  color: var(--dim);
  line-height: 1.9;
}
.key {
  display: inline-block;
  background: var(--border);
  color: var(--text);
  padding: 0 3px;
  font-size: 7px;
  border-bottom: 2px solid #333;
}

/* ════════════════════════════════════════
   MOBILE OVERLAY VIDEOS (< 640px)
════════════════════════════════════════ */
#mobile-videos {
  display: none;
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 10;
  display: none;
  flex-direction: column;
  gap: 4px;
  pointer-events: none;
}
.mob-vid-item {
  position: relative;
  width: 80px;
  background: #000;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.mob-vid-item video {
  width: 100%;
  display: block;
  aspect-ratio: 4/3;
  object-fit: cover;
}
.mob-vid-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.7);
  font-size: 6px;
  padding: 1px 3px;
  color: var(--text);
}
.mob-vid-self .mob-vid-label { color: var(--yellow); }

/* ════════════════════════════════════════
   MOBILE BOTTOM DRAWER
════════════════════════════════════════ */
#mob-drawer {
  display: none;
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-top: 2px solid var(--border);
  z-index: 15;
  transition: transform .25s ease;
  transform: translateY(100%);
}
#mob-drawer.open { transform: translateY(0); }

#mob-drawer-handle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
#mob-drawer-handle span { font-size: 9px; color: var(--dim); letter-spacing: 2px; }
#mob-drawer-handle .arrow { font-size: 10px; color: var(--accent); transition: transform .2s; }
#mob-drawer.open .arrow { transform: rotate(180deg); }

#mob-drawer-content {
  padding: 8px 12px;
  max-height: 160px;
  overflow-y: auto;
}
#mob-players-list .pl-row { font-size: 10px; padding: 3px 0; }
#mob-players-list .pl-dot { width: 9px; height: 9px; }

/* ════════════════════════════════════════
   DPAD (スマホ用タップ操作)
════════════════════════════════════════ */
#dpad {
  display: none;
  position: absolute;
  bottom: 60px;
  left: 16px;
  z-index: 10;
  width: 108px;
  height: 108px;
}
.dpad-btn {
  position: absolute;
  width: 34px;
  height: 34px;
  background: rgba(95,95,239,.35);
  border: 1px solid rgba(95,95,239,.6);
  color: #fff;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 3px;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
  user-select: none;
}
.dpad-btn:active { background: rgba(95,95,239,.65); }
#dpad-up    { top: 0;    left: 37px; }
#dpad-down  { bottom: 0; left: 37px; }
#dpad-left  { top: 37px; left: 0;    }
#dpad-right { top: 37px; right: 0;   }
#dpad-center {
  position: absolute;
  top: 37px; left: 37px;
  width: 34px; height: 34px;
  background: rgba(30,30,60,.5);
  border: 1px solid var(--border);
  border-radius: 3px;
}
